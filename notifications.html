<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Notifications</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#121212;
    color:white;
}

/* MAIN */
.container{
    max-width:700px;
    margin:30px auto;
    padding:20px;
}

/* TITLE */
.title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
    text-align:center;
}

/* NOTIFICATION CARD */
.notification-card{
    background:#1e1e2f;
    padding:15px;
    border-radius:8px;
    margin-bottom:15px;
}

/* TYPE */
.type{
    color:#00d4ff;
    font-weight:bold;
    margin-bottom:8px;
}

/* MESSAGE */
.message{
    line-height:1.6;
}

/* EMPTY */
.empty{
    text-align:center;
    color:#aaa;
    margin-top:50px;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        🔔 Notifications
    </div>

    <div id="notification-container">

        <div class="empty">
            Loading notifications...
        </div>

    </div>

</div>


<script>

// ---------- LOAD NOTIFICATIONS ----------
async function loadNotifications(){

    try{

        let response = await fetch("/notifications");

        let data = await response.json();

        let container =
            document.getElementById("notification-container");

        container.innerHTML = "";

        // NO DATA
        if(data.length === 0){

            container.innerHTML = `
                <div class="empty">
                    No notifications available
                </div>
            `;

            return;
        }

        // SHOW DATA
        data.reverse().forEach(item => {

            let div = document.createElement("div");

            div.className = "notification-card";

            div.innerHTML = `
                <div class="type">
                    ${item.type || "General"}
                </div>

                <div class="message">
                    ${item.message}
                </div>
            `;

            container.appendChild(div);

        });

    }

    catch(error){

        document.getElementById(
            "notification-container"
        ).innerHTML = `
            <div class="empty">
                Error loading notifications
            </div>
        `;

    }

}


// ---------- INIT ----------
loadNotifications();

</script>

</body>
</html>
