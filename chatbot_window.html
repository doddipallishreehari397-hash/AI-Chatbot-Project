<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chatbot</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#121212;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* ================= CHAT CONTAINER ================= */

.chat-container{
    width:650px;
    height:600px;
    background:#1a1a1a;
    border-radius:12px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* ================= HEADER ================= */

.header{
    background:#1f1f1f;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

/* ================= CHAT AREA ================= */

.chat-area{
    flex:1;
    overflow-y:auto;
    padding:15px;
    background:#121212;
}

/* ================= LABELS ================= */

.msg-label{
    font-size:12px;
    font-weight:bold;
    margin-bottom:4px;
}

.user-label{
    color:#00d4ff;
}

.bot-label{
    color:#2ecc71;
}

/* ================= MESSAGES ================= */

.user-msg{
    background:#2b2b3c;
    color:white;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
    width:fit-content;
    max-width:80%;
}

.bot-msg{
    background:#1abc9c;
    color:white;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
    width:fit-content;
    max-width:80%;
}

/* ================= INPUT AREA ================= */

.bottom{
    display:flex;
    padding:12px;
    background:#1f1f1f;
    border-top:1px solid #333;
}

#input{
    flex:1;
    padding:12px;
    border:none;
    outline:none;
    background:#2b2b3c;
    color:white;
    border-radius:6px;
    font-size:15px;
}

/* ================= BUTTONS ================= */

button{
    margin-left:8px;
    padding:10px 14px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    opacity:0.85;
}

.send{
    background:#00d4ff;
}

.voice{
    background:#2ecc71;
    color:white;
}

.clear{
    background:#e74c3c;
    color:white;
}

/* ================= LISTENING EFFECT ================= */

.listening{
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }
}

<button id="micButton" class="voice">
    🎤 Start Mic
</button>

<script>

const micButton = document.getElementById("micButton");

micButton.addEventListener("click", () => {

    // STOP OLD SPEECH
    window.speechSynthesis.cancel();

    // CHECK BROWSER SUPPORT
    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if (!SpeechRecognition) {

        alert("Speech Recognition Not Supported");

        return;
    }

    // CREATE OBJECT
    const recognition =
        new SpeechRecognition();

    recognition.lang = "en-US";

    recognition.continuous = false;

    recognition.interimResults = false;

    // BUTTON STATUS
    micButton.innerText = "🎤 Listening...";

    // START MIC
    recognition.start();

    // RESULT
    recognition.onresult = (event) => {

        const text =
            event.results[0][0].transcript;

        sendMessage(text);
    };

    // END
    recognition.onend = () => {

        micButton.innerText =
            "🎤 Start Mic";
    };

    // ERROR
    recognition.onerror = (event) => {

        console.log(event.error);

        micButton.innerText =
            "🎤 Start Mic";

        alert(
            "Microphone Error: " +
            event.error
        );
    };
});

</script>
</body>
</html>
