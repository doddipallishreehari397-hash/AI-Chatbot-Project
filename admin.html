<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

/* ================= BODY ================= */

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#121212;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

/* ================= PANEL ================= */

.admin-container{
    width:500px;
    background:#1f1f1f;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* ================= TITLE ================= */

h2{
    text-align:center;
    margin-bottom:25px;
    color:#00d4ff;
}

/* ================= LABELS ================= */

label{
    font-size:14px;
    margin-bottom:5px;
    display:block;
}

/* ================= INPUTS ================= */

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:18px;
    border:none;
    border-radius:6px;
    background:#2b2b3c;
    color:white;
    outline:none;
    font-size:14px;
    box-sizing:border-box;
}

/* ================= BUTTON ================= */

button{
    width:100%;
    padding:12px;
    background:#00d4ff;
    border:none;
    border-radius:6px;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    font-size:15px;
}

button:hover{
    opacity:0.85;
}

/* ================= STATUS ================= */

#status{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
}

/* ================= NOTIFICATION LIST ================= */

.notification-box{
    margin-top:25px;
    background:#2b2b3c;
    padding:15px;
    border-radius:8px;
    max-height:200px;
    overflow-y:auto;
}

.notification-item{
    background:#1abc9c;
    padding:10px;
    border-radius:6px;
    margin-bottom:10px;
    color:white;
}

.notification-type{
    font-weight:bold;
    color:#121212;
}

</style>

</head>

<body>

<div class="admin-container">

    <h2>⚙️ Admin Panel</h2>

    <!-- TYPE -->
    <label>Notification Type</label>

    <select id="type">

        <option value="">Select Type</option>

        <option value="exam">Exam</option>

        <option value="timetable">Timetable</option>

        <option value="update">Update</option>

        <option value="general">General</option>

    </select>

    <!-- MESSAGE -->
    <label>Notification Message</label>

    <textarea
        id="message"
        rows="4"
        placeholder="Enter notification..."
    ></textarea>

    <!-- BUTTON -->
    <button onclick="addNotification()">

        🚀 Send Notification

    </button>

    <!-- STATUS -->
    <p id="status"></p>

    <!-- NOTIFICATION LIST -->
    <div class="notification-box">

        <h3>📢 Recent Notifications</h3>

        <div id="notificationList"></div>

    </div>

</div>

<script>

/* ================= LOAD NOTIFICATIONS ================= */

async function loadNotifications(){

    try{

        let response =
            await fetch("/notifications");

        let data =
            await response.json();

        let list =
            document.getElementById(
                "notificationList"
            );

        list.innerHTML = "";

        data.reverse().forEach(item => {

            list.innerHTML += `

                <div class="notification-item">

                    <div class="notification-type">
                        ${item.type.toUpperCase()}
                    </div>

                    <div>
                        ${item.message}
                    </div>

                </div>

            `;
        });

    }catch(error){

        console.log(error);
    }
}

/* ================= ADD NOTIFICATION ================= */

async function addNotification(){

    let type =
        document.getElementById(
            "type"
        ).value;

    let message =
        document.getElementById(
            "message"
        ).value;

    let status =
        document.getElementById(
            "status"
        );

    // VALIDATION
    if(type === "" || message === ""){

        status.innerText =
            "⚠️ Fill all fields";

        status.style.color = "orange";

        return;
    }

    try{

        let response =
            await fetch(
                "/add_notification",
                {
                    method:"POST",

                    headers:{
                        "Content-Type":
                        "application/json"
                    },

                    body:JSON.stringify({

                        type:type,
                        message:message
                    })
                }
            );

        let data =
            await response.json();

        // SUCCESS
        if(data.success){

            status.innerText =
                "✅ Notification Added";

            status.style.color =
                "#2ecc71";

            // CLEAR INPUTS
            document.getElementById(
                "type"
            ).value = "";

            document.getElementById(
                "message"
            ).value = "";

            // RELOAD
            loadNotifications();

        }else{

            status.innerText =
                "❌ Failed";

            status.style.color =
                "red";
        }

    }catch(error){

        status.innerText =
            "❌ Server Error";

        status.style.color =
            "red";

        console.log(error);
    }
}

/* ================= AUTO LOAD ================= */

loadNotifications();

</script>

</body>
</html>
